name: balango
description: Balango is a hyper-casual, one-finger game where your goal is to balance a stick for as long as possible."
publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.8.1
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_shared_components:
    git:
      url: https://github.com/SoloScripted/flutter-shared-components.git

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/logo.png
